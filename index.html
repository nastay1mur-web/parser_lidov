<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Парсер лидов</title>

  <!-- Telegram Web App SDK — обязательно до любого JS -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Корневой контейнер приложения -->
  <div id="app">

    <!-- Стек экранов: таб-экраны + push-экраны -->
    <div id="screen-stack">
      <!-- Экраны монтируются сюда через router.js -->
    </div>

    <!-- Нижний таббар (скрыт на push-экранах) -->
    <nav id="tabbar" class="tabbar" style="display:none">
      <button class="tab-item" data-tab="feed">
        <span class="tab-icon">📡</span>
        <span class="tab-label">Лента</span>
        <span class="tab-badge" id="tab-badge" style="display:none">0</span>
      </button>
      <button class="tab-item" data-tab="hot">
        <span class="tab-icon">🔥</span>
        <span class="tab-label">Горячие</span>
      </button>
      <button class="tab-item" data-tab="settings">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">Настройки</span>
      </button>
    </nav>

  </div>

  <!-- Оверлей для bottom sheet (экран 3 — Написать) -->
  <div id="sheet-overlay" class="sheet-overlay" style="display:none">
    <div id="sheet" class="sheet">
      <!-- Контент шита монтируется сюда через send.js -->
    </div>
  </div>

  <!-- Тост-уведомление (глобальное) -->
  <div id="toast" class="toast" style="display:none"></div>

  <!-- JS файлы — порядок важен: утилиты → роутер → экраны → точка входа -->
  <script src="js/telegram.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>
  <script src="js/screens/onboarding.js"></script>
  <script src="js/screens/feed.js"></script>
  <script src="js/screens/details.js"></script>
  <script src="js/screens/send.js"></script>
  <script src="js/screens/hot.js"></script>
  <script src="js/screens/settings.js"></script>
  <script src="js/screens/search.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
