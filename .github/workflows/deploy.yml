# Автоматический деплой tg-app/ на GitHub Pages
# Запускается при каждом push в ветку main

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # позволяет запустить вручную из GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload tg-app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tg-app/   # публикуем только папку tg-app/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
